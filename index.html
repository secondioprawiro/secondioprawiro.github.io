<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secondio Prawiro — Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#07090f',
            surface: '#0d1122',
            accent: '#3dffa2',
            'accent-blue': '#5b9cf6',
          },
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            sans: ['DM Sans', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #07090f;
      color: #dde4f0;
      overflow-x: hidden;
    }

    /* Dot grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #07090f; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(61,255,162,0.3); }

    /* Selection */
    ::selection { background: rgba(61,255,162,0.25); color: #dde4f0; }

    /* ─── Glassmorphism Panel ─── */
    .glass-panel {
      background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.03) 60%, rgba(255,255,255,0.01) 100%);
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.13),
        0 20px 60px rgba(0,0,0,0.5);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
    }

    /* ─── Project / Item Card ─── */
    .glass-card {
      background: linear-gradient(160deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.03) 50%, rgba(255,255,255,0.01) 100%);
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 10px 30px rgba(0,0,0,0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .glass-card:hover {
      transform: translateY(-5px);
      border-color: rgba(61,255,162,0.22);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 24px 60px rgba(0,0,0,0.5),
        0 0 40px rgba(61,255,162,0.07);
    }

    /* ─── Buttons ─── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 15px;
      color: #07090f;
      background: linear-gradient(180deg, #3dffa2 0%, #1de882 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.35),
        0 4px 20px rgba(61,255,162,0.3);
      border: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.35),
        0 8px 28px rgba(61,255,162,0.4);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 15px;
      color: rgba(221,228,240,0.75);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-secondary:hover {
      color: #dde4f0;
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.18);
      transform: translateY(-2px);
    }

    /* ─── Skill Tags ─── */
    .skill-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      color: rgba(221,228,240,0.55);
      transition: all 0.2s ease;
      cursor: default;
    }

    .skill-tag:hover {
      background: rgba(61,255,162,0.09);
      border-color: rgba(61,255,162,0.28);
      color: #3dffa2;
    }

    /* ─── Contact Cards ─── */
    .contact-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 24px;
      text-decoration: none;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.11);
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .contact-card:hover {
      transform: translateY(-5px);
      border-color: rgba(61,255,162,0.22);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.11),
        0 20px 50px rgba(0,0,0,0.3),
        0 0 30px rgba(61,255,162,0.07);
    }

    .contact-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    /* ─── Marquee ─── */
    .marquee-wrapper {
      width: 100%;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%);
      mask-image: linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%);
    }

    .marquee-track {
      display: flex;
      gap: 48px;
      animation: marquee 28s linear infinite;
      width: max-content;
    }

    .marquee-item {
      color: rgba(221,228,240,0.22);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .marquee-dot {
      color: rgba(61,255,162,0.3);
      font-size: 10px;
    }

    /* ─── Section Divider ─── */
    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #3dffa2;
      margin-bottom: 20px;
    }

    .section-label::before {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: #3dffa2;
    }

    /* ─── Nav active indicator ─── */
    .nav-link {
      position: relative;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 1.5px;
      background: #3dffa2;
      transform: scaleX(0);
      transition: transform 0.25s ease;
    }

    .nav-link.active {
      color: #3dffa2;
    }

    .nav-link.active::after {
      transform: scaleX(1);
    }

    /* ─── Calendar Container ─── */
    .calendar-glass {
      background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 20px 60px rgba(0,0,0,0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 2.5rem;
      width: 100%;
      overflow: hidden;
      transition: border-color 0.3s ease;
    }

    .calendar-glass:hover {
      border-color: rgba(61,255,162,0.2);
    }

    /* ─── Expand animation ─── */
    .expand-container {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.6s cubic-bezier(0.4,0,0.2,1);
    }

    .expand-container.is-open {
      grid-template-rows: 1fr;
    }

    .expand-content { overflow: hidden; }

    /* ─── Keyframes ─── */
    @keyframes marquee {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    @keyframes revealGrid {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .animate-reveal {
      animation: revealGrid 0.5s ease forwards;
    }

    .animate-fade-up {
      animation: fadeUp 0.7s ease forwards;
    }

    .hero-text-1 { animation: fadeUp 0.7s 0.1s ease both; }
    .hero-text-2 { animation: fadeUp 0.7s 0.25s ease both; }
    .hero-text-3 { animation: fadeUp 0.7s 0.4s ease both; }
    .hero-text-4 { animation: fadeUp 0.7s 0.55s ease both; }

    /* No-scrollbar */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Category badge on project image */
    .category-badge {
      background: rgba(7,9,15,0.75);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      color: #dde4f0;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 8px;
    }
  </style>
